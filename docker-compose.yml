services:
  backend:
    build:
      context: ./QuickQuote
      dockerfile: Dockerfile
    env_file: .env
    container_name: quickquote-backend
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
      ORDER_DB_HOST: "${ORDER_DB_HOST:?ORDER_DB_HOST is required}"
      ORDER_DB_PORT: "${ORDER_DB_PORT:-3306}"
      ORDER_DB_USER: "${ORDER_DB_USER:?ORDER_DB_USER is required}"
      ORDER_DB_PASSWORD: "${ORDER_DB_PASSWORD:?ORDER_DB_PASSWORD is required}"
      ORDER_DB_NAME: "${ORDER_DB_NAME:?ORDER_DB_NAME is required}"
      PURCHASE_DB_HOST: "${PURCHASE_DB_HOST:?PURCHASE_DB_HOST is required}"
      PURCHASE_DB_PORT: "${PURCHASE_DB_PORT:-3306}"
      PURCHASE_DB_USER: "${PURCHASE_DB_USER:?PURCHASE_DB_USER is required}"
      PURCHASE_DB_PASSWORD: "${PURCHASE_DB_PASSWORD:?PURCHASE_DB_PASSWORD is required}"
      PURCHASE_DB_NAME: "${PURCHASE_DB_NAME:?PURCHASE_DB_NAME is required}"
      LLM_API_KEY: "${LLM_API_KEY:?LLM_API_KEY is required}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://api.openai.com/v1}"
      MODEL_NAME: "${MODEL_NAME:-gpt-4o-mini}"
      MODEL_SQL: "${MODEL_SQL:-gpt-4o-mini}"
      MODEL_THINK: "${MODEL_THINK:-gpt-4.1-mini}"
      LLM_TIMEOUT: "${LLM_TIMEOUT:-120}"
      QUERY_CANDIDATE_LIMIT: "${QUERY_CANDIDATE_LIMIT:-5}"
      MAX_INPUT_ITEMS: "${MAX_INPUT_ITEMS:-2000}"
      JOB_INPUT_THRESHOLD: "${JOB_INPUT_THRESHOLD:-100}"
      DB_CANDIDATE_BATCH_SIZE: "${DB_CANDIDATE_BATCH_SIZE:-25}"
      DB_CANDIDATE_QUERY_TIMEOUT: "${DB_CANDIDATE_QUERY_TIMEOUT:-8}"
      DB_CANDIDATE_LIMIT_MULTIPLIER: "${DB_CANDIDATE_LIMIT_MULTIPLIER:-4}"
      PURCHASE_CANDIDATE_SCAN_LIMIT: "${PURCHASE_CANDIDATE_SCAN_LIMIT:-100}"
      ORDER_QUERY_MAX_CONCURRENCY: "${ORDER_QUERY_MAX_CONCURRENCY:-5}"
      EXTERNAL_QUERY_MAX_CONCURRENCY: "${EXTERNAL_QUERY_MAX_CONCURRENCY:-10}"
      CACHE_TTL_SECONDS: "${CACHE_TTL_SECONDS:-120}"
      JUSHUITAN_ENV: "${JUSHUITAN_ENV:-prod}"
      JUSHUITAN_BASE_URL: "${JUSHUITAN_BASE_URL:-https://openapi.jushuitan.com}"
      JUSHUITAN_BASE_URL_TEST: "${JUSHUITAN_BASE_URL_TEST:-https://dev-api.jushuitan.com}"
      JUSHUITAN_APP_KEY: "${JUSHUITAN_APP_KEY:?JUSHUITAN_APP_KEY is required}"
      JUSHUITAN_APP_SECRET: "${JUSHUITAN_APP_SECRET:?JUSHUITAN_APP_SECRET is required}"
      JUSHUITAN_AUTH_CODE: "${JUSHUITAN_AUTH_CODE:-}"
      JUSHUITAN_ACCESS_TOKEN: "${JUSHUITAN_ACCESS_TOKEN:-}"
      JUSHUITAN_REFRESH_TOKEN: "${JUSHUITAN_REFRESH_TOKEN:-}"
      JUSHUITAN_ENABLE_TOKEN_CACHE: "${JUSHUITAN_ENABLE_TOKEN_CACHE:-true}"
      JUSHUITAN_TOKEN_CACHE_FILE: "${JUSHUITAN_TOKEN_CACHE_FILE:-/app/data/.jushuitan_token_cache.json}"
      JUSHUITAN_AUTH_CODE_RANDOM_LENGTH: "${JUSHUITAN_AUTH_CODE_RANDOM_LENGTH:-6}"
      JUSHUITAN_QUERY_MAX_CONCURRENCY: "${JUSHUITAN_QUERY_MAX_CONCURRENCY:-10}"
      JUSHUITAN_QUERY_MAX_PAGES: "${JUSHUITAN_QUERY_MAX_PAGES:-2}"
      JUSHUITAN_INVENTORY_MAX_CONCURRENCY: "${JUSHUITAN_INVENTORY_MAX_CONCURRENCY:-3}"
      JUSHUITAN_INVENTORY_MAX_WAREHOUSES: "${JUSHUITAN_INVENTORY_MAX_WAREHOUSES:-4}"
      JUSHUITAN_INVENTORY_WMS_CO_IDS: "${JUSHUITAN_INVENTORY_WMS_CO_IDS:-}"
      JUSHUITAN_QUERY_CACHE_TTL_SECONDS: "${JUSHUITAN_QUERY_CACHE_TTL_SECONDS:-300}"
      JUSHUITAN_AUTH_INIT_PATH: "${JUSHUITAN_AUTH_INIT_PATH:-/openWeb/auth/getInitToken}"
      JUSHUITAN_AUTH_INIT_PATH_TEST: "${JUSHUITAN_AUTH_INIT_PATH_TEST:-/openWebIsv/auth/getInitToken}"
      JUSHUITAN_SKU_QUERY_PATH: "${JUSHUITAN_SKU_QUERY_PATH:-/open/sku/query}"
      JUSHUITAN_INVENTORY_QUERY_PATH: "${JUSHUITAN_INVENTORY_QUERY_PATH:-/open/inventory/query}"
      JUSHUITAN_PURCHASE_IN_QUERY_PATH: "${JUSHUITAN_PURCHASE_IN_QUERY_PATH:-/open/purchasein/query}"
      JUSHUITAN_DYNAMIC_COST_LOOKBACK_DAYS: "${JUSHUITAN_DYNAMIC_COST_LOOKBACK_DAYS:-30}"
      JUSHUITAN_DYNAMIC_COST_MAX_PAGES: "${JUSHUITAN_DYNAMIC_COST_MAX_PAGES:-20}"
      JUSHUITAN_DEFAULT_WMS_CO_ID: "${JUSHUITAN_DEFAULT_WMS_CO_ID:-0}"
      JUSHUITAN_TIMEOUT: "${JUSHUITAN_TIMEOUT:-30}"
      JUSHUITAN_MAX_ITEMS: "${JUSHUITAN_MAX_ITEMS:-100}"
      JUSHUITAN_PAGE_SIZE: "${JUSHUITAN_PAGE_SIZE:-100}"
      JUSHUITAN_CHARSET: "${JUSHUITAN_CHARSET:-utf-8}"
      JUSHUITAN_VERSION: "${JUSHUITAN_VERSION:-2}"
      JUSHUITAN_SIGN_ALGO: "${JUSHUITAN_SIGN_ALGO:-md5}"
      JUSHUITAN_SIGN_LOWERCASE: "${JUSHUITAN_SIGN_LOWERCASE:-true}"
      UPLOAD_DIR: "${UPLOAD_DIR:-/app/uploads}"
      QUOTE_ARCHIVE_DIR: "${QUOTE_ARCHIVE_DIR:-/app/data}"
      MAX_FILE_SIZE_MB: "${MAX_FILE_SIZE_MB:-10}"
    volumes:
      - quickquote_uploads:/app/uploads
      - quickquote_data:/app/data
      - ./brand_item_price:/brand_item_price:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - quickquote-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quickquote-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_BASE_URL: ${API_BASE_URL:-/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - quickquote-net

volumes:
  quickquote_uploads:
  quickquote_data:

networks:
  quickquote-net:
    driver: bridge
